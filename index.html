<!doctype html>
<html lang="en" class="h-full">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=Startup" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StartupCRM | Premium Lead Management Platform</title>
  <meta name="description" id="meta-description" content="StartupCRM is a premium customer relationship management workspace for modern startup teams to track leads, contacts, pipelines, and analytics." />
  <script>
    (function() {
      try {
        const isDark = localStorage.getItem('startup-crm-theme') === 'true';
        if (isDark) {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }
      } catch (e) {}
    })();
  </script>
  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- Font Awesome Icons with Built-in Animations -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <!-- Google Sign In client script -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>

<body class="h-full bg-bg text-slate-900 transition-colors duration-200">
  <div id="root" class="h-full"></div>
  <script type="module" src="/src/main.jsx"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindplus/elements@1" type="module"></script>
</body>

</html>
